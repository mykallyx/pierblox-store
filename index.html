<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PierBlox Store</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:#050505;color:white;font-family:sans-serif}.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}.card:hover{transform:translateY(-5px);transition:0.3s;border-color:#3b82f6}</style></head><body class="p-6 md:p-12"><nav class="glass p-5 mb-10 flex justify-between items-center max-w-6xl mx-auto"><h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent italic">PIERBLOX</h1><button onclick="document.getElementById("modal").style.display="flex"" class="glass px-6 py-2 text-sm font-bold hover:bg-white/5 transition-all">Login</button></nav><div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto"></div><div id="modal" style="display:none" class="fixed inset-0 bg-black/90 items-center justify-center p-4 z-50"><div class="glass p-10 w-full max-w-md text-center"><h2 class="text-xl font-bold mb-6">Acesso Admin</h2><input type="password" id="p" placeholder="Senha" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 text-center outline-none focus:border-blue-500 text-white"><button onclick="v()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 transition-all">Entrar</button><button onclick="document.getElementById("modal").style.display="none"" class="w-full mt-4 text-xs text-white/30">Fechar</button></div></div><script>const prods=[{n:"ROBUX BARATO",d:"O melhor preço para o seu Robux.",i:"https://i.ibb.co/60S7YfC/robux.png",p:"45,00"},{n:"BLOX FRUITS",d:"Frutas permanentes e exclusivas.",i:"https://i.ibb.co/PchLz5V/frutas.png",p:"150,00"},{n:"CONTAS UPADAS",d:"Contas prontas para jogar com itens raros.",i:"https://i.ibb.co/m0f6w30/contas.png",p:"60,00"}];document.getElementById("grid").innerHTML=prods.map(p=>`<div class="glass card p-6 flex flex-col h-full border border-white/5"><img src="${p.i}" class="w-full h-44 object-cover rounded-xl mb-6 shadow-2xl"><h3 class="text-lg font-bold mb-2 tracking-tight">${p.n}</h3><p class="text-white/40 text-sm mb-6 flex-grow">${p.d}</p><div class="flex items-center justify-between mt-auto"><span class="text-xl font-black text-blue-400 font-mono italic">R$ ${p.p}</span><button class="glass px-4 py-2 text-xs font-bold hover:bg-blue-600/20 transition-all uppercase tracking-widest">Comprar</button></div></div>`).join("");function v(){if(document.getElementById("p").value==="2026"){alert("Logado!");document.getElementById("modal").style.display="none"}else{alert("Senha incorreta")}}</script></body></html>
