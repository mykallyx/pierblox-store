<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PierBlox Store - Premium Gaming Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@300;400;600;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.6);
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 0, 0.05) 0%, transparent 40%);
        }

        .navbar {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border); z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: 950; letter-spacing: -1px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        .nav-actions { display: flex; align-items: center; gap: 15px; }

        .google-auth-btn {
            background: white; color: black; border: none; padding: 10px 18px;
            border-radius: 50px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }

        .logged-user {
            display: none; align-items: center; gap: 12px; cursor: pointer;
            padding: 5px 15px; border-radius: 50px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
        }
        .logged-user img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary); }
        .logged-user span { font-weight: 700; font-size: 0.9rem; }

        .btn-dots {
            background: rgba(255,255,255,0.05); color: white; border: none;
            width: 45px; height: 45px; border-radius: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        .header { padding: 140px 5% 60px; text-align: center; }
        .main-title { font-size: 4.5rem; font-weight: 950; line-height: 1; margin-bottom: 20px; letter-spacing: -3px; }
        .main-title span { color: var(--primary); text-shadow: 0 0 30px var(--primary-glow); }

        .products-container { padding: 0 5% 100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 30px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(255,0,0,0.1); }

        .card-img { height: 220px; background-size: cover; background-position: center; position: relative; }
        .card-tag { position: absolute; top: 20px; left: 20px; background: var(--primary); color: white; padding: 6px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 900; }

        .card-info { padding: 25px; }
        .card-info h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
        .card-info p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; }

        .card-footer { padding: 0 25px 25px; display: flex; justify-content: space-between; align-items: center; }
        .price-label { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .price-val { font-size: 1.3rem; font-weight: 950; color: var(--text-main); }
        .btn-view { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 15px; font-size: 0.8rem; font-weight: 800; border: 1px solid var(--card-border); }

        .drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh;
            background: #0a0a0a; border-radius: 40px 40px 0 0; z-index: 2000;
            padding: 40px 5%; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            border-top: 1px solid var(--card-border); box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
        }
        .drawer.active { bottom: 0; }
        .drawer-handle { width: 50px; height: 5px; background: #333; border-radius: 10px; margin: -20px auto 30px; }

        .variation-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--card-border);
            padding: 20px; border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px; transition: 0.3s;
        }
        .variation-card:hover { border-color: var(--primary); background: rgba(255,0,0,0.02); }
        .btn-cart-add { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 900; cursor: pointer; }

        .sidebar {
            position: fixed; right: -100%; top: 0; width: 400px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--card-border); z-index: 3000;
            padding: 40px 30px; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: 800; z-index: 9999; display: none; box-shadow: 0 10px 30px var(--primary-glow);
        }

        .cart-floating {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: var(--primary); border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; color: white; cursor: pointer;
            z-index: 1100; box-shadow: 0 10px 30px var(--primary-glow); transition: 0.3s;
        }
        .cart-floating:hover { transform: scale(1.1); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: white; color: var(--primary); font-size: 0.8rem; font-weight: 900; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary); }

        /* Auth Modal */
        .auth-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); z-index: 5000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-modal.active { display: flex; }
        .auth-card {
            background: #0a0a0a; border: 1px solid var(--card-border);
            width: 100%; max-width: 400px; padding: 30px; border-radius: 30px;
        }
        .auth-tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #222; }
        .auth-tab { padding: 10px 0; color: var(--text-dim); cursor: pointer; font-weight: 700; flex: 1; text-align: center; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--primary); border-color: var(--primary); }
        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; }
        .auth-input { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); padding: 15px; border-radius: 12px; color: white; outline: none; }
        .btn-auth-submit { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* Profile */
        #profile-section { display: none; flex-direction: column; height: 100%; }
        .profile-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px; padding: 20px; background: rgba(255,0,0,0.05); border-radius: 20px; }
        .profile-photo-large { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .purchase-card { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #ff4444; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: auto; }

        @media (max-width: 600px) {
            .main-title { font-size: 3rem; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast">Prontinho!</div>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- Modal de Auth -->
    <div class="auth-modal" id="auth-modal">
        <div class="auth-card animate__animated animate__zoomIn">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-weight: 900;">PIER<span>BLOX</span> ID</h3>
                <i class="fas fa-times" onclick="closeAuth()" style="cursor: pointer;"></i>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">LOGIN</div>
                <div class="auth-tab" id="tab-signup" onclick="switchAuth('signup')">CADASTRO</div>
            </div>
            <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
                <input type="text" class="auth-input" placeholder="Usuário" required id="li-user">
                <input type="password" class="auth-input" placeholder="Senha" required id="li-pass">
                <button type="submit" class="btn-auth-submit">ENTRAR</button>
            </form>
            <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
                <input type="text" class="auth-input" placeholder="Usuário" required id="su-user">
                <input type="password" class="auth-input" placeholder="Senha" required id="su-pass">
                <button type="submit" class="btn-auth-submit">CRIAR CONTA</button>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">PIER<span>BLOX</span></div>
        <div class="nav-actions">
            <button class="google-auth-btn" id="login-btn" onclick="openAuth()">
                <i class="fas fa-user"></i> Login
            </button>
            <div class="logged-user" id="user-display" onclick="openProfile()">
                <img src="" id="user-photo">
                <span id="user-name"></span>
            </div>
            <button class="btn-dots" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <header class="header">
        <h1 class="main-title animate__animated animate__fadeIn">A MELHOR LOJA<br>DE <span>ROBLOX</span></h1>
        <p style="color: var(--text-dim); max-width: 600px; margin: 0 auto 40px; line-height: 1.6;">Produtos premium, entrega instantânea e o melhor preço do mercado. PierBlox é a sua escolha número 1.</p>
    </header>

    <main class="products-container" id="products-grid"></main>

    <div class="drawer" id="drawer">
        <div class="drawer-handle"></div>
        <h2 id="d-name" style="font-size: 2rem; font-weight: 950; margin-bottom: 5px;">Produto</h2>
        <p id="d-desc" style="color: var(--text-dim); margin-bottom: 30px;">Descrição completa aqui.</p>
        <div id="variations-list"></div>
    </div>

    <div class="cart-floating" onclick="toggleSidebar()">
        <i class="fas fa-shopping-cart"></i>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 id="sidebar-title" style="font-weight: 950; font-size: 1.8rem;">MENU</h2>
            <i class="fas fa-times" onclick="closeAll()" style="font-size: 1.5rem; cursor: pointer;"></i>
        </div>
        
        <div id="cart-section" style="flex: 1; display: flex; flex-direction: column; overflow-y: hidden;">
            <div style="flex: 1; overflow-y: auto;">
                <p style="font-weight: 800; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Seu Carrinho</p>
                <div id="cart-items-list"></div>
            </div>
            <div style="margin-top: 20px; border-top: 1px solid var(--card-border); padding-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem; margin-bottom: 20px;">
                    <span>Total:</span>
                    <span id="cart-total-val" style="color: var(--primary);">R$ 0,00</span>
                </div>
                <button onclick="checkout()" class="btn-cart-add" style="width: 100%; padding: 18px; font-size: 1rem;">FINALIZAR NO WHATSAPP</button>
            </div>
        </div>

        <div id="profile-section">
            <div class="profile-header">
                <img src="" id="profile-img-large" class="profile-photo-large">
                <h2 id="profile-name-display" style="font-weight: 950;">Usuário</h2>
            </div>
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px;">Minhas Compras</p>
            <div id="purchases-list" style="flex: 1; overflow-y: auto;"></div>
            <button class="btn-logout" onclick="handleLogout()">SAIR DA CONTA</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Robux Premium", desc: "Entrega via Grupo ou Gamepass.", img: "https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=500&auto=format&fit=crop", tag: "MAIS VENDIDO", variations: [{ n: "400 Robux", p: 19.90 }, { n: "800 Robux", p: 38.00 }] },
            { id: 2, name: "Blox Fruits", desc: "Frutas míticas no estoque.", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=500&auto=format&fit=crop", tag: "ESTOQUE NOVO", variations: [{ n: "Leopard", p: 25.00 }, { n: "Kitsune", p: 35.00 }] }
        ];

        let cart = JSON.parse(localStorage.getItem('pb_cart')) || [];
        let user = JSON.parse(localStorage.getItem('pb_user')) || null;

        function renderProducts() {
            document.getElementById('products-grid').innerHTML = products.map(p => `
                <div class="card" onclick="openDrawer(${p.id})">
                    <div class="card-img" style="background-image: url('${p.img}')"><div class="card-tag">${p.tag}</div></div>
                    <div class="card-info"><h3>${p.name}</h3><p>${p.desc}</p></div>
                    <div class="card-footer">
                        <div><span class="price-label">A partir de</span><span class="price-val">R$ ${p.variations[0].p.toFixed(2).replace('.', ',')}</span></div>
                        <div class="btn-view">VER OPÇÕES</div>
                    </div>
                </div>
            `).join('');
        }

        function openDrawer(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('d-name').innerText = p.name;
            document.getElementById('d-desc').innerText = p.desc;
            document.getElementById('variations-list').innerHTML = p.variations.map(v => `
                <div class="variation-card">
                    <div><div style="font-weight: 800;">${v.n}</div><div style="color: var(--primary);">R$ ${v.p.toFixed(2).replace('.', ',')}</div></div>
                    <button class="btn-cart-add" onclick="addToCart('${v.n}', ${v.p})">ADD</button>
                </div>
            `).join('');
            document.getElementById('drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            localStorage.setItem('pb_cart', JSON.stringify(cart));
            updateCartUI();
            showToast('Adicionado! 🛒');
            closeAll();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div><div style="font-weight: 700;">${item.name}</div><div style="color: var(--primary); font-size: 0.9rem;">R$ ${item.price.toFixed(2).replace('.', ',')}</div></div>
                    <i class="fas fa-trash" onclick="removeItem(${index})" style="cursor: pointer; color: #444;"></i>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total-val').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('pb_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function checkout() {
            if (cart.length === 0) return alert('Carrinho vazio!');
            let itemsStr = cart.map(i => `• ${i.name} (R$ ${i.price.toFixed(2).replace('.', ',')})`).join('\n');
            let total = cart.reduce((s, i) => s + i.price, 0).toFixed(2).replace('.', ',');
            
            if(user) {
                let history = JSON.parse(localStorage.getItem(`history_${user.name}`)) || [];
                history.unshift({ date: new Date().toLocaleDateString('pt-BR'), items: itemsStr, total: total });
                localStorage.setItem(`history_${user.name}`, JSON.stringify(history));
            }

            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent("*PEDIDO PIERBLOX*\n\n" + itemsStr + "\n\n*TOTAL: R$ " + total + "*")}`, '_blank');
        }

        function openAuth() { document.getElementById('auth-modal').classList.add('active'); }
        function closeAuth() { document.getElementById('auth-modal').classList.remove('active'); }
        function switchAuth(m) {
            document.getElementById('tab-login').classList.toggle('active', m === 'login');
            document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
            document.getElementById('form-login').classList.toggle('active', m === 'login');
            document.getElementById('form-signup').classList.toggle('active', m === 'signup');
        }

        function handleSignup(e) {
            e.preventDefault();
            const u = document.getElementById('su-user').value;
            const p = document.getElementById('su-pass').value;
            let users = JSON.parse(localStorage.getItem('pb_users')) || {};
            if(users[u]) return alert('Usuário já existe!');
            users[u] = { password: p };
            localStorage.setItem('pb_users', JSON.stringify(users));
            showToast('Conta criada!');
            switchAuth('login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('li-user').value;
            const p = document.getElementById('li-pass').value;
            let users = JSON.parse(localStorage.getItem('pb_users')) || {};
            if(users[u] && users[u].password === p) {
                user = { name: u, photo: `https://ui-avatars.com/api/?name=${u}&background=ff0000&color=fff` };
                localStorage.setItem('pb_user', JSON.stringify(user));
                updateAuthUI();
                closeAuth();
                showToast('Logado! 🕷️');
            } else alert('Erro no login!');
        }

        function updateAuthUI() {
            if(user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').style.display = 'flex';
                document.getElementById('user-photo').src = user.photo;
                document.getElementById('user-name').innerText = user.name;
            } else {
                document.getElementById('login-btn').style.display = 'flex';
                document.getElementById('user-display').style.display = 'none';
            }
        }

        function openProfile() {
            document.getElementById('sidebar-title').innerText = "PERFIL";
            document.getElementById('cart-section').style.display = "none";
            document.getElementById('profile-section').style.display = "flex";
            document.getElementById('profile-img-large').src = user.photo;
            document.getElementById('profile-name-display').innerText = user.name;
            const history = JSON.parse(localStorage.getItem(`history_${user.name}`)) || [];
            document.getElementById('purchases-list').innerHTML = history.length ? history.map(h => `
                <div class="purchase-card">
                    <div style="font-weight: 700; color: var(--primary); font-size: 0.8rem;">${h.date}</div>
                    <div style="font-size: 0.8rem; margin: 5px 0; color: #888;">${h.items}</div>
                    <div style="font-weight: 900;">R$ ${h.total}</div>
                </div>
            `).join('') : '<p style="text-align:center; padding:20px; opacity:0.5;">Nenhuma compra.</p>';
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function handleLogout() {
            user = null;
            localStorage.removeItem('pb_user');
            updateAuthUI();
            closeAll();
        }

        function toggleSidebar() {
            document.getElementById('sidebar-title').innerText = "MENU";
            document.getElementById('cart-section').style.display = "flex";
            document.getElementById('profile-section').style.display = "none";
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function closeAll() {
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        renderProducts();
        updateCartUI();
        updateAuthUI();
    </script>
</body>
</html>
