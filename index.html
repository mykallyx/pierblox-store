<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIERBLOX STORE | PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff00ff; --bg: #050505; --card: #0f0f0f; --card-border: #1a1a1a; --text: #ffffff; --text-dim: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); padding: 15px 20px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(to right, #fff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-btn { background: var(--card); border: 1px solid var(--card-border); color: #fff; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        #cart-count { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #fff; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
        .hero { padding: 40px 20px; text-align: center; background: radial-gradient(circle at top, #ff00ff15 0%, transparent 70%); }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 25px; scrollbar-width: none; }
        .category-tab { background: var(--card); border: 1px solid var(--card-border); padding: 12px 22px; border-radius: 50px; white-space: nowrap; font-size: 0.85rem; font-weight: 800; color: var(--text-dim); }
        .category-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 20px 40px; }
        .product-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 22px; overflow: hidden; position: relative; cursor: pointer; }
        .product-img-container { width: 100%; height: 160px; background: #111; overflow: hidden; }
        .product-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .product-body { padding: 18px; }
        .price-tag { display: block; color: var(--primary); font-weight: 950; font-size: 1.2rem; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card); border-top: 2px solid var(--card-border); border-radius: 35px 35px 0 0; z-index: 2000; transition: 0.5s; padding: 35px 25px; }
        .drawer.active { bottom: 0; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1999; display: none; }
        .drawer-overlay.active { display: block; }
        .variation-card { background: var(--bg); border: 2px solid var(--card-border); padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .variation-card.active { border-color: var(--primary); }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: 900; font-size: 1.05rem; cursor: pointer; }
        .sidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 420px; height: 100%; background: var(--bg); z-index: 2000; transition: 0.4s; padding: 35px 25px; border-left: 1px solid var(--card-border); }
        .sidebar.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--card); border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--card-border); }
    </style>
</head>
<body>
    <header><div class="logo">PIERBLOX</div><div class="nav-btn" onclick="toggleCart()"><i class="fas fa-shopping-bag"></i><div id="cart-count">0</div></div></header>
    <div class="hero"><h1>O MELHOR DO<br><span style="color:var(--primary)">DIGITAL</span></h1></div>
    <div class="categories"><div class="category-tab active">🚀 TODOS</div></div>
    <div class="products-grid" id="products-grid"></div>
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div style="display:flex; gap:20px; margin-bottom:25px;"><img id="drawer-img" style="width:100px; height:100px; border-radius:15px; object-fit:cover;"><div><h2 id="drawer-title"></h2><p id="drawer-desc" style="font-size:0.8rem; color:#888;"></p></div></div>
        <div id="drawer-variations"></div>
        <button class="btn-main" onclick="addToCart()" style="margin-top:20px;">ADICIONAR AO CARRINHO</button>
    </div>
    <div class="sidebar" id="cart-sidebar"><div style="display:flex; justify-content:space-between; margin-bottom:30px;"><h2>Carrinho</h2><i class="fas fa-times" onclick="toggleCart()"></i></div><div id="cart-list" style="height:calc(100% - 250px); overflow-y:auto;"></div><div style="margin-top:20px;"><h3>Total: R$ <span id="cart-total">0,00</span></h3><button class="btn-main" onclick="checkout()">FINALIZAR PIX</button></div></div>
    <script>
        const MP_ACCESS_TOKEN = 'APP_USR-1598174317006783-071901-9a069520bee2070399bb41e01d5d0c6c-2373373406';
        const products = [
            { id: 999, name: "TESTE PIX 0,20", desc: "Apenas para teste.", p: 0.20, img: "https://cdn-icons-png.flaticon.com/512/5968/5968301.png", variations: [{n: "Teste", p: 0.20}] },
            { id: 1, name: "PIERBLOX PLUS", desc: "Acesso total.", p: 29.90, img: "https://placehold.co/400x300/111/f0f?text=PLUS", variations: [{n: "Mensal", p: 29.90}] }
        ];
        let cart = [];
        function renderProducts() { document.getElementById('products-grid').innerHTML = products.map(p => `<div class="product-card" onclick="openDrawer(${p.id})"><div class="product-img-container"><img src="${p.img}"></div><div class="product-body"><h3>${p.name}</h3><span class="price-tag">R$ ${p.p.toFixed(2)}</span></div></div>`).join(''); }
        function openDrawer(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('drawer-img').src = p.img; document.getElementById('drawer-title').innerText = p.name; document.getElementById('drawer-desc').innerText = p.desc;
            document.getElementById('drawer-variations').innerHTML = p.variations.map(v => `<div class="variation-card active"><span>${v.n}</span><strong>R$ ${v.p.toFixed(2)}</strong></div>`).join('');
            window.selP = p.p; window.selN = p.name;
            document.getElementById('drawer').classList.add('active'); document.getElementById('drawer-overlay').classList.add('active');
        }
        function closeDrawer() { document.getElementById('drawer').classList.remove('active'); document.getElementById('drawer-overlay').classList.remove('active'); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function addToCart() { cart.push({n: window.selN, p: window.selP}); updateCartUI(); closeDrawer(); }
        function updateCartUI() {
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `<div class="cart-item"><div><b>${i.n}</b><br>R$ ${i.p.toFixed(2)}</div><i class="fas fa-trash" onclick="cart.splice(${idx},1); updateCartUI();" style="color:red; cursor:pointer;"></i></div>`).join('');
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = cart.reduce((s,x)=>s+x.p, 0).toFixed(2);
        }
        async function checkout() {
            const total = cart.reduce((s,x)=>s+x.p, 0);
            try {
                const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.mercadopago.com/v1/payments'), {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + MP_ACCESS_TOKEN, 'Content-Type': 'application/json', 'X-Idempotency-Key': 'pb_'+Math.random() },
                    body: JSON.stringify({ transaction_amount: parseFloat(total), description: 'Pedido', payment_method_id: 'pix', payer: { email: 'c@p.com' } })
                });
                const d = await r.json();
                if(d.point_of_interaction) {
                    const m = document.createElement('div');
                    m.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;";
                    m.innerHTML = `<h2 style="color:#f0f;">PIX GERADO</h2><img src="data:image/png;base64,${d.point_of_interaction.transaction_data.qr_code_base64}" style="width:250px;border-radius:15px;margin:20px 0;"><p>Aguardando pagamento automático...</p><button class="btn-main" onclick="location.reload()" style="background:#222; margin-top:20px;">CANCELAR</button>`;
                    document.body.appendChild(m);
                    setInterval(async () => {
                        const rp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.mercadopago.com/v1/payments/'+d.id), { headers: {'Authorization':'Bearer '+MP_ACCESS_TOKEN}});
                        const dp = await rp.json(); if(dp.status === 'approved') location.reload();
                    }, 5000);
                }
            } catch(e) { alert('Erro no Pix.'); }
        }
        renderProducts();
    </script>
</body>
</html>
