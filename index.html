<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PierBlox Store - Premium Gaming Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@300;400;600;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.6);
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: var(--text-main); font-family: 'Poppins', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #200000 0%, transparent 50%);
        }

        .navbar {
            position: fixed; top: 0; width: 100%; padding: 20px 6%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--card-border);
        }
        .logo { font-size: 1.5rem; font-weight: 950; letter-spacing: -1px; }
        .logo span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .login-btn { 
            background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 12px;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .logged-user { display: none; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid var(--card-border); }
        .logged-user img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .logged-user span { font-weight: 700; font-size: 0.9rem; }
        .btn-dots { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; }

        .hero { padding: 140px 6% 60px; text-align: center; }
        .main-title { font-size: 5rem; font-weight: 950; line-height: 1; letter-spacing: -3px; margin-bottom: 15px; }
        .main-title span { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }

        .products-container { padding: 40px 6%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { 
            background: var(--card-bg); border: 1px solid var(--card-border); padding: 25px; border-radius: 30px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255,0,0,0.1); }
        .price-tag { color: var(--primary); font-weight: 950; font-size: 1.5rem; margin-top: 15px; display: block; }
        
        /* Modal Drawer */
        .drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #0a0a0a; border-radius: 30px 30px 0 0;
            padding: 40px 6%; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-top: 1px solid var(--card-border);
        }
        .drawer.active { bottom: 0; }
        .drawer-handle { width: 50px; height: 5px; background: #333; border-radius: 10px; margin: -20px auto 30px; }

        /* Sidebar */
        .sidebar {
            position: fixed; right: -100%; top: 0; width: 380px; height: 100%; background: #0a0a0a;
            z-index: 3000; transition: 0.4s; padding: 40px 30px; display: flex; flex-direction: column; border-left: 1px solid var(--card-border);
        }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        /* Variations */
        .variation-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 20px;
            border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .btn-cart-add { background: var(--primary); border: none; color: white; padding: 12px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* Floating Cart */
        .floating-cart {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 65px; height: 65px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
            box-shadow: 0 10px 30px var(--primary-glow); cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .cart-count { position: absolute; top: -5px; right: -5px; background: white; color: black; font-size: 0.8rem; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* Profile & Purchases */
        .profile-photo-large { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .purchase-card { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #ff4444; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: 20px; }

        /* Auth Modal */
        .auth-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .auth-modal.active { display: flex; }
        .auth-card { background: #0a0a0a; border: 1px solid var(--card-border); width: 100%; max-width: 400px; padding: 35px; border-radius: 30px; }
        .auth-tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #222; }
        .auth-tab { padding: 10px 0; color: var(--text-dim); cursor: pointer; font-weight: 700; flex: 1; text-align: center; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--primary); border-color: var(--primary); }
        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; }
        .auth-input { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); padding: 15px; border-radius: 12px; color: white; outline: none; }
        .btn-auth-submit { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* Custom Alerts */
        .alert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .alert-card { background: #0a0a0a; border: 1px solid var(--primary); width: 100%; max-width: 350px; padding: 35px; border-radius: 25px; text-align: center; box-shadow: 0 0 30px var(--primary-glow); }
        .alert-icon { font-size: 3.5rem; color: var(--primary); margin-bottom: 15px; }
        .alert-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 20px; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid var(--primary); color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 6000; font-weight: 700; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        @media (max-width: 600px) {
            .main-title { font-size: 3rem; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast">Prontinho!</div>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- Alert Customizado -->
    <div class="alert-overlay" id="alert-modal">
        <div class="alert-card animate__animated animate__zoomIn">
            <div id="alert-icon" class="alert-icon"><i class="fas fa-exclamation-circle"></i></div>
            <h3 id="alert-title" style="font-weight: 900; margin-bottom: 10px;">AVISO</h3>
            <p id="alert-msg" style="color: var(--text-dim);"></p>
            <button class="alert-btn" onclick="closeAlert()">OK, ENTENDI</button>
        </div>
    </div>

    <!-- Modal Login/Cadastro -->
    <div class="auth-modal" id="auth-modal">
        <div class="auth-card animate__animated animate__zoomIn">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="font-weight: 950; font-size: 1.4rem;">PIER<span>BLOX</span> ID</h3>
                <i class="fas fa-times" onclick="closeAuth()" style="cursor: pointer; opacity: 0.5;"></i>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">ENTRAR</div>
                <div class="auth-tab" id="tab-signup" onclick="switchAuth('signup')">CRIAR CONTA</div>
            </div>
            <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
                <input type="text" class="auth-input" placeholder="Usuário" id="li-user" required>
                <input type="password" class="auth-input" placeholder="Senha" id="li-pass" required>
                <button type="submit" class="btn-auth-submit">ENTRAR NA LOJA</button>
            </form>
            <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
                <input type="text" class="auth-input" placeholder="Novo Usuário" id="su-user" required>
                <input type="password" class="auth-input" placeholder="Sua Senha" id="su-pass" required>
                <button type="submit" class="btn-auth-submit">CADASTRAR AGORA</button>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">PIER<span>BLOX</span></div>
        <div class="nav-actions">
            <button class="login-btn" id="login-btn" onclick="openAuth()"><i class="fas fa-user"></i> Login</button>
            <div class="logged-user" id="user-display" onclick="openProfile()">
                <img src="" id="user-photo"> <span id="user-name"></span>
            </div>
            <button class="btn-dots" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <header class="hero">
        <h1 class="main-title">LOJA<span> PREMIUM</span></h1>
        <p style="color: var(--text-dim); max-width: 600px; margin: 0 auto;">Produtos exclusivos de Roblox (Blox Fruits, Robux e mais) com entrega imediata e suporte 24h.</p>
    </header>

    <main class="products-container" id="products-grid"></main>

    <div class="floating-cart" onclick="toggleSidebar()">
        <i class="fas fa-shopping-cart"></i>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <!-- Detalhes do Produto (Drawer) -->
    <div class="drawer" id="drawer">
        <div class="drawer-handle"></div>
        <h2 id="d-name" style="font-size: 2.2rem; font-weight: 950; margin-bottom: 10px;">Produto</h2>
        <p id="d-desc" style="color: var(--text-dim); margin-bottom: 30px; font-size: 0.95rem;">Descrição completa.</p>
        <div id="variations-list"></div>
    </div>

    <!-- Sidebar (Carrinho / Perfil) -->
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 id="sidebar-title" style="font-weight: 950; font-size: 1.8rem;">MENU</h2>
            <i class="fas fa-times" onclick="closeAll()" style="font-size: 1.5rem; cursor: pointer; opacity: 0.5;"></i>
        </div>
        
        <div id="cart-section" style="flex: 1; display: flex; flex-direction: column;">
            <div id="cart-items-list" style="flex: 1; overflow-y: auto;"></div>
            <div style="margin-top: 20px; border-top: 1px solid var(--card-border); padding-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem; margin-bottom: 20px;">
                    <span>Total:</span> <span id="cart-total-val" style="color: var(--primary);">R$ 0,00</span>
                </div>
                <button onclick="checkout()" class="btn-cart-add" style="width: 100%; padding: 18px;">FINALIZAR NO WHATSAPP</button>
            </div>
        </div>

        <div id="profile-section" style="display: none; flex: 1; flex-direction: column;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="" id="profile-img-large" class="profile-photo-large">
                <h2 id="profile-name-display" style="font-weight: 950; margin-top: 15px; font-size: 1.8rem;"></h2>
            </div>
            <p style="font-weight: 800; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px;">Histórico de Compras</p>
            <div id="purchases-list" style="flex: 1; overflow-y: auto;"></div>
            <button class="btn-logout" onclick="handleLogout()">SAIR DA CONTA</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "ROBUX BARATO", desc: "Entrega rápida via Gamepass ou Grupo. O melhor preço do mercado!", variations: [{n: "1.000 Robux", p: 45.00}, {n: "5.000 Robux", p: 210.00}] },
            { id: 2, name: "BLOX FRUITS", desc: "Frutas permanentes e itens míticos para sua conta ser a melhor.", variations: [{n: "Kitsune (Perm)", p: 120.00}, {n: "Leopard (Perm)", p: 95.00}, {n: "Dark Blade", p: 40.00}] }
        ];

        let cart = JSON.parse(localStorage.getItem('pb_cart')) || [];
        let user = JSON.parse(localStorage.getItem('pb_user')) || null;

        function showAlert(t, m, err = true) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('alert-icon').innerHTML = err ? '<i class="fas fa-times-circle"></i>' : '<i class="fas fa-check-circle"></i>';
            document.getElementById('alert-icon').style.color = err ? '#ff0000' : '#00ff00';
            document.getElementById('alert-modal').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function openAuth() { document.getElementById('auth-modal').classList.add('active'); }
        function closeAuth() { document.getElementById('auth-modal').classList.remove('active'); }
        function switchAuth(m) {
            const isL = m === 'login';
            document.getElementById('tab-login').classList.toggle('active', isL);
            document.getElementById('tab-signup').classList.toggle('active', !isL);
            document.getElementById('form-login').classList.toggle('active', isL);
            document.getElementById('form-signup').classList.toggle('active', !isL);
        }

        function handleSignup(e) {
            e.preventDefault();
            const u = document.getElementById('su-user').value.trim();
            const p = document.getElementById('su-pass').value.trim();
            // Pegar o banco de dados global dos usuários
            let db = JSON.parse(localStorage.getItem('pb_global_db')) || {};
            if(db[u]) return showAlert('AVISO', 'Este usuário já está em uso!');
            db[u] = { pass: p };
            // Salvar no banco global (que não é removido no logout)
            localStorage.setItem('pb_global_db', JSON.stringify(db));
            showAlert('SUCESSO', 'Conta criada! Pode entrar agora.', false);
            switchAuth('login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('li-user').value.trim();
            const p = document.getElementById('li-pass').value.trim();
            // Buscar no banco global
            let db = JSON.parse(localStorage.getItem('pb_global_db')) || {};
            if(db[u] && db[u].pass === p) {
                user = { name: u, photo: `https://ui-avatars.com/api/?name=${u}&background=ff0000&color=fff` };
                localStorage.setItem('pb_user', JSON.stringify(user));
                updateAuthUI(); closeAuth(); showToast(`Bem-vindo, ${u}!`);
            } else showAlert('ERRO', 'Usuário ou senha incorretos!');
        }

        function handleLogout() {
            user = null; localStorage.removeItem('pb_user'); updateAuthUI(); closeAll(); showToast('Até logo!');
        }

        function updateAuthUI() {
            const b = document.getElementById('login-btn');
            const d = document.getElementById('user-display');
            if(user) { b.style.display = 'none'; d.style.display = 'flex'; document.getElementById('user-photo').src = user.photo; document.getElementById('user-name').innerText = user.name; }
            else { b.style.display = 'flex'; d.style.display = 'none'; }
        }

        function renderProducts() {
            document.getElementById('products-grid').innerHTML = products.map(p => `
                <div class="product-card animate__animated animate__fadeInUp" onclick="openDrawer(${p.id})">
                    <h3 style="font-weight: 900;">${p.name}</h3>
                    <p style="color: var(--text-dim); font-size: 0.8rem; margin: 10px 0;">${p.desc}</p>
                    <span class="price-tag">A partir de R$ ${Math.min(...p.variations.map(v=>v.p)).toFixed(2).replace('.',',')}</span>
                </div>
            `).join('');
        }

        function openDrawer(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('d-name').innerText = p.name;
            document.getElementById('d-desc').innerText = p.desc;
            document.getElementById('variations-list').innerHTML = p.variations.map(v => `
                <div class="variation-card">
                    <div><div style="font-weight: 800;">${v.n}</div><div style="color: var(--primary); font-weight: 950;">R$ ${v.p.toFixed(2).replace('.', ',')}</div></div>
                    <button class="btn-cart-add" onclick="addToCart('${v.n}', ${v.p})">ADICIONAR</button>
                </div>
            `).join('');
            document.getElementById('drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function addToCart(n, p) {
            cart.push({ n, p }); localStorage.setItem('pb_cart', JSON.stringify(cart));
            updateCartUI(); showToast('Adicionado ao carrinho!'); closeAll();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            let sum = 0;
            if(cart.length === 0) list.innerHTML = '<p style="text-align:center; padding:50px; opacity:0.3;">Seu carrinho está vazio.</p>';
            else {
                list.innerHTML = cart.map((item, i) => {
                    sum += item.p;
                    return `<div style="display:flex; justify-content:space-between; margin-bottom:15px;"><div><b>${item.n}</b><br><small>R$ ${item.p.toFixed(2)}</small></div><i class="fas fa-trash" onclick="removeItem(${i})" style="color:#ff4444; cursor:pointer;"></i></div>`;
                }).join('');
            }
            document.getElementById('cart-total-val').innerText = `R$ ${sum.toFixed(2).replace('.', ',')}`;
        }

        function removeItem(i) { cart.splice(i, 1); localStorage.setItem('pb_cart', JSON.stringify(cart)); updateCartUI(); }

        function toggleSidebar() {
            document.getElementById('sidebar-title').innerText = "CARRINHO";
            document.getElementById('cart-section').style.display = "flex";
            document.getElementById('profile-section').style.display = "none";
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function openProfile() {
            document.getElementById('sidebar-title').innerText = "PERFIL";
            document.getElementById('cart-section').style.display = "none";
            document.getElementById('profile-section').style.display = "flex";
            document.getElementById('profile-img-large').src = user.photo;
            document.getElementById('profile-name-display').innerText = user.name;
            const h = JSON.parse(localStorage.getItem(`h_${user.name}`)) || [];
            document.getElementById('purchases-list').innerHTML = h.length ? h.map(x => `<div class="purchase-card"><small>${x.d}</small><br><b>${x.i}</b><br><span style="color:var(--primary)">R$ ${x.t}</span></div>`).join('') : '<p style="text-align:center; padding:30px; opacity:0.3;">Nenhuma compra.</p>';
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeAll() {
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function checkout() {
            if(!cart.length) return showAlert('AVISO', 'Carrinho vazio!');
            let items = cart.map(i => `• ${i.n}`).join('\n');
            let total = cart.reduce((s, x) => s + x.p, 0).toFixed(2);
            if(user) {
                let h = JSON.parse(localStorage.getItem(`h_${user.name}`)) || [];
                h.unshift({ d: new Date().toLocaleDateString(), i: items, t: total });
                localStorage.setItem(`h_${user.name}`, JSON.stringify(h));
            }
            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent("*PEDIDO PIERBLOX*\n\n"+items+"\n\n*TOTAL: R$ "+total+"*")}`);
        }

        renderProducts(); updateCartUI(); updateAuthUI();
    </script>
</body>
</html>
