<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PierBlox Store - Premium Gaming Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@300;400;600;950&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.5);
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.02);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #300000 0%, transparent 50%),
                linear-gradient(to right, #0d0d0d 1px, transparent 1px),
                linear-gradient(to bottom, #0d0d0d 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Header */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(5, 5, 5, 0.8);
            border-bottom: 1px solid var(--card-border);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-box {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .menu-dots {
            width: 45px; height: 45px;
            display: flex; flex-direction: column; gap: 5px;
            align-items: center; justify-content: center;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            background: var(--card-bg);
        }
        .menu-dots span { width: 4px; height: 4px; background: white; border-radius: 50%; }

        /* Hero Section */
        .hero {
            padding: 140px 20px 60px;
            text-align: center;
        }

        .main-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(3rem, 12vw, 5.5rem);
            font-weight: 950;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 30%, #ff0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255,0,0,0.3));
        }

        .verified-spider {
            width: 45px;
            height: 45px;
            vertical-align: middle;
            margin-left: -10px;
            filter: drop-shadow(0 0 10px #ff0000);
            animation: pulse-spider 2s infinite;
        }

        @keyframes pulse-spider {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ff0000); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ff0000); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #ff0000); }
        }

        .slogan {
            color: var(--text-dim);
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* Grid de Categorias */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .cat-btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn.active, .cat-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* Products Grid */
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 0, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .p-img {
            width: 100%; height: 200px;
            background: #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; color: #222;
            position: relative;
        }

        .p-badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .p-info { padding: 20px; }
        .p-title { font-weight: 800; font-size: 1.3rem; margin-bottom: 5px; }
        .p-desc { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; min-height: 40px; }
        
        .p-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .p-price { font-weight: 900; font-size: 1.4rem; color: var(--primary); }
        .btn-view {
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .btn-view:hover { transform: scale(1.05); }

        /* Drawer / Modal */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .drawer {
            width: 100%;
            max-width: 500px;
            background: #0a0a0a;
            border-top: 2px solid var(--primary);
            border-radius: 30px 30px 0 0;
            padding: 30px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .drawer.active { transform: translateY(0); }

        .drawer-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }
        .close-drawer { font-size: 2rem; cursor: pointer; color: var(--text-dim); }

        .variation-list { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .var-item {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .var-item:hover { border-color: var(--primary); background: #150000; }
        .var-name { font-weight: 700; }
        .var-price { color: var(--primary); font-weight: 900; }

        .btn-cart-add {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Floating Cart Icon */
        .cart-float {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 65px; height: 65px;
            background: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px var(--primary-glow);
            cursor: pointer;
            z-index: 1500;
            transition: 0.3s;
        }
        .cart-float:hover { transform: scale(1.1) rotate(10deg); }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: white; color: black;
            width: 25px; height: 25px;
            border-radius: 50%;
            font-size: 0.8rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed; top: 0; right: 0;
            width: 100%; max-width: 400px; height: 100%;
            background: #080808;
            border-left: 1px solid var(--card-border);
            z-index: 3000;
            transform: translateX(100%);
            transition: 0.4s;
            padding: 30px;
            display: flex; flex-direction: column;
        }
        .cart-sidebar.active { transform: translateX(0); }

        .cart-items { flex: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }
        .cart-item-info h4 { font-size: 1rem; margin-bottom: 4px; }
        .cart-item-info p { color: var(--primary); font-weight: 700; font-size: 0.9rem; }
        .btn-remove { color: #555; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-remove:hover { color: var(--primary); }

        .cart-footer { padding-top: 20px; border-top: 1px solid #222; }
        .cart-total { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .total-price { font-size: 1.8rem; font-weight: 900; color: var(--primary); }

        .btn-checkout {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* Menu Sidebar (Right) */
        .menu-sidebar {
            position: fixed; top: 0; right: 0;
            width: 300px; height: 100%;
            background: #0a0a0a;
            z-index: 3500;
            transform: translateX(100%);
            transition: 0.4s;
            padding: 40px;
            border-left: 1px solid var(--primary);
        }
        .menu-sidebar.active { transform: translateX(0); }
        .menu-links { display: flex; flex-direction: column; gap: 30px; margin-top: 50px; }
        .menu-link {
            font-size: 1.2rem; font-weight: 700; color: white; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .menu-link:hover { color: var(--primary); transform: translateX(10px); }

        /* Toast Notifications */
        .toast {
            position: fixed; top: 100px; right: 20px;
            background: #111;
            border-left: 4px solid var(--primary);
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5000;
            display: none;
            animation: slideInRight 0.5s;
        }

        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero { padding: 120px 15px 40px; }
            .products-container { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
            .p-img { height: 140px; font-size: 40px; }
            .p-info { padding: 15px; }
            .p-title { font-size: 1rem; }
            .p-price { font-size: 1.1rem; }
            .btn-view { padding: 8px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-box"><i class="fas fa-spider"></i></div>
            <span style="font-weight: 900; font-size: 1.2rem; letter-spacing: 1px;">PIERBLOX</span>
        </div>
        <div class="menu-dots" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <section class="hero">
        <h1 class="main-title animate__animated animate__fadeInDown">
            <span class="gradient-text">PierBlox</span>
            <img src="https://share.zapia.com/tjbr0xfylxy8jku8ak35jx" class="verified-spider" alt="Verified">
        </h1>
        <p class="slogan">sua lojinha favorita!</p>

        <div class="categories animate__animated animate__fadeInUp animate__delay-1s">
            <button class="cat-btn active">Todos</button>
            <button class="cat-btn">Robux</button>
            <button class="cat-btn">Blox Fruits</button>
            <button class="cat-btn">Contas</button>
        </div>
    </section>

    <main class="products-container" id="products-grid">
        <!-- JS irá renderizar os produtos aqui -->
    </main>

    <!-- Drawer de Produto -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()">
        <div class="drawer" id="product-drawer" onclick="event.stopPropagation()">
            <div class="drawer-header">
                <h2 id="drawer-title" style="font-family: 'Poppins', sans-serif; font-weight: 950; font-size: 1.8rem;"></h2>
                <div class="close-drawer" onclick="closeDrawer()">&times;</div>
            </div>
            <p id="drawer-desc" style="color: var(--text-dim); margin-bottom: 20px;"></p>
            <h3 style="font-weight: 800; font-size: 1rem; text-transform: uppercase; color: var(--primary);">Escolha uma opção:</h3>
            <div class="variation-list" id="variation-list"></div>
        </div>
    </div>

    <!-- Carrinho Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="drawer-header">
            <h2 style="font-family: 'Poppins', sans-serif; font-weight: 950;">SEU CARRINHO</h2>
            <div class="close-drawer" onclick="toggleCart()">&times;</div>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Itens do carrinho -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL:</span>
                <span class="total-price" id="cart-total-price">R$ 0,00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Finalizar no WhatsApp</button>
        </div>
    </div>

    <!-- Menu Lateral -->
    <div class="menu-sidebar" id="menu-sidebar">
        <div class="drawer-header">
            <h2 style="font-family: 'Poppins', sans-serif; font-weight: 950;">MENU</h2>
            <div class="close-drawer" onclick="toggleMenu()">&times;</div>
        </div>
        <div class="menu-links">
            <a href="#" class="menu-link" onclick="toggleMenu(); toggleCart();"><i class="fas fa-shopping-cart"></i> Carrinho</a>
            <a href="https://site.zapia.com/yr7l84c7" target="_blank" class="menu-link"><i class="fas fa-users"></i> Comunidade</a>
            <a href="#" class="menu-link"><i class="fas fa-star"></i> Avaliações</a>
            <a href="#" class="menu-link"><i class="fas fa-headset"></i> Suporte</a>
        </div>
    </div>

    <!-- Carrinho Flutuante -->
    <div class="cart-float" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <div class="toast" id="toast">Item adicionado ao carrinho!</div>

    <script>
        const products = [
            {
                id: 1,
                title: "Pacote Robux",
                desc: "Robux baratos com entrega rápida via Gamepass ou Grupo.",
                icon: "fas fa-gem",
                badge: "Popular",
                variations: [
                    { name: "400 Robux", price: 19.90 },
                    { name: "800 Robux", price: 38.00 },
                    { name: "1700 Robux", price: 75.00 }
                ]
            },
            {
                id: 2,
                title: "Blox Fruits",
                desc: "Frutas físicas e permanentes para a sua conta.",
                icon: "fas fa-apple-alt",
                badge: "Hot",
                variations: [
                    { name: "Leopard (Física)", price: 25.00 },
                    { name: "Dragon (Física)", price: 20.00 },
                    { name: "Kitsune (Física)", price: 45.00 }
                ]
            },
            {
                id: 3,
                title: "Contas Level Max",
                desc: "Contas prontas para o PvP com itens raros.",
                icon: "fas fa-user-shield",
                variations: [
                    { name: "Level 2550 + Godhuman", price: 15.00 },
                    { name: "Level 2550 + CDK", price: 20.00 }
                ]
            }
        ];

        let cart = JSON.parse(localStorage.getItem('pierblox_cart')) || [];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card animate__animated animate__fadeIn">
                    <div class="p-img">
                        <i class="${p.icon}"></i>
                        ${p.badge ? `<div class="p-badge">${p.badge}</div>` : ''}
                    </div>
                    <div class="p-info">
                        <h3 class="p-title">${p.title}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="p-footer">
                            <div class="p-price">A partir de R$ ${p.variations[0].price.toFixed(2).replace('.', ',')}</div>
                            <button class="btn-view" onclick="openDrawer(${p.id})">VER OPÇÕES</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDrawer(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('drawer-title').innerText = p.title;
            document.getElementById('drawer-desc').innerText = p.desc;
            
            const list = document.getElementById('variation-list');
            list.innerHTML = p.variations.map(v => `
                <div class="var-item" onclick="addToCart('${p.title}', '${v.name}', ${v.price})">
                    <div class="var-name">${v.name}</div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span class="var-price">R$ ${v.price.toFixed(2).replace('.', ',')}</span>
                        <div class="btn-cart-add"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
            `).join('');

            document.getElementById('drawer-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('product-drawer').classList.add('active'), 10);
        }

        function closeDrawer() {
            document.getElementById('product-drawer').classList.remove('active');
            setTimeout(() => document.getElementById('drawer-overlay').style.display = 'none', 400);
        }

        function addToCart(pName, vName, price) {
            cart.push({ id: Date.now(), name: `${pName} - ${vName}`, price: price });
            saveCart();
            showToast(`Adicionado: ${vName}`);
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('pierblox_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total-price');

            count.innerText = cart.length;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #555; margin-top: 50px;">Seu carrinho está vazio.</p>';
                total.innerText = 'R$ 0,00';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <i class="fas fa-trash btn-remove" onclick="removeFromCart(${item.id})"></i>
                    </div>
                `).join('');

                const sum = cart.reduce((a, b) => a + b.price, 0);
                total.innerText = `R$ ${sum.toFixed(2).replace('.', ',')}`;
            }
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function toggleMenu() {
            document.getElementById('menu-sidebar').classList.toggle('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function checkout() {
            if (cart.length === 0) return alert('Seu carrinho está vazio!');
            
            let msg = "*NOVO PEDIDO - PIERBLOX*\n\n";
            let sum = 0;
            cart.forEach(item => {
                msg += `• ${item.name} - R$ ${item.price.toFixed(2).replace('.', ',')}\n`;
                sum += item.price;
            });
            msg += `\n*TOTAL: R$ ${sum.toFixed(2).replace('.', ',')}*`;
            
            const waUrl = `https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`;
            window.open(waUrl, '_blank');
        }

        // Inicialização
        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
