<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIERBLOX STORE | OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff00ff; --bg: #050505; --card: #0f0f0f; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .product-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #1a1a1a; cursor: pointer; text-align:center; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .cart-sidebar { position: fixed; right: -100%; top: 0; width: 300px; height: 100%; background: #000; transition: 0.3s; padding: 20px; border-left: 1px solid #1a1a1a; z-index: 1000; }
        .cart-sidebar.active { right: 0; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .modal { position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column; text-align:center; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 900; font-size: 1.5rem;">PIERBLOX</div>
        <i class="fas fa-shopping-bag" style="cursor:pointer" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
    </header>
    <div class="products-grid" id="grid"></div>
    <div class="cart-sidebar" id="sidebar">
        <h2>Seu Carrinho</h2>
        <div id="cart-list"></div>
        <div id="total" style="margin: 20px 0; font-weight: bold; font-size: 1.2rem;">Total: R$ 0,00</div>
        <button class="btn" onclick="checkout()">FINALIZAR PIX</button>
        <button class="btn" style="background:#333" onclick="document.getElementById('sidebar').classList.remove('active')">FECHAR</button>
    </div>
    <script>
        const MP_ACCESS_TOKEN = 'APP_USR-1598174317006783-071901-9a069520bee2070399bb41e01d5d0c6c-2373373406';
        const products = [
            { id: 999, name: "TESTE PIX 0,20", p: 0.20, img: "https://cdn-icons-png.flaticon.com/512/5968/5968301.png" },
            { id: 1, name: "PIERBLOX PLUS", p: 29.90, img: "https://placehold.co/400x300/1a1a1a/ffffff?text=PIERBLOX+PLUS" },
            { id: 2, name: "REMOVER ADS", p: 15.00, img: "https://placehold.co/400x300/1a1a1a/ffffff?text=NO+ADS" }
        ];
        let cart = [];
        function render() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <img src="${p.img}">
                    <div><b>${p.name}</b></div>
                    <div class="price">R$ ${p.p.toFixed(2)}</div>
                    <button class="btn" style="padding:8px; font-size:0.8rem">ADICIONAR</button>
                </div>`).join('');
        }
        function addToCart(id) {
            cart.push(products.find(x => x.id === id));
            update();
            document.getElementById('sidebar').classList.add('active');
        }
        function update() {
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #1a1a1a; padding-bottom:5px">
                    <span>${i.name}</span>
                    <b>R$ ${i.p.toFixed(2)}</b>
                </div>`).join('');
            document.getElementById('total').innerText = 'Total: R$ ' + cart.reduce((s,x)=>s+x.p, 0).toFixed(2);
        }
        async function checkout() {
            const total = cart.reduce((s,x)=>s+x.p, 0);
            if(total === 0) return alert('O carrinho está vazio!');
            try {
                const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.mercadopago.com/v1/payments'), {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + MP_ACCESS_TOKEN, 'Content-Type': 'application/json', 'X-Idempotency-Key': 'pb_'+Math.random() },
                    body: JSON.stringify({ transaction_amount: parseFloat(total), description: 'Pedido PierBlox', payment_method_id: 'pix', payer: { email: 'cliente@pierblox.com' } })
                });
                const d = await r.json();
                if(d.point_of_interaction) {
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <h2 style="color:#ff00ff">PAGAMENTO PIX</h2>
                        <img src="data:image/png;base64,${d.point_of_interaction.transaction_data.qr_code_base64}" style="width:250px; border-radius:15px; border:2px solid #ff00ff">
                        <p style="margin:20px; font-weight:bold">Aguardando confirmação automática...</p>
                        <button class="btn" style="width:200px; background:#333" onclick="location.reload()">CANCELAR</button>
                    `;
                    document.body.appendChild(modal);
                    setInterval(async () => {
                        const rp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.mercadopago.com/v1/payments/'+d.id), { headers: {'Authorization': 'Bearer '+MP_ACCESS_TOKEN}});
                        const dp = await rp.json();
                        if(dp.status === 'approved') {
                            modal.innerHTML = '<h2 style="color:#00ff00">PAGO COM SUCESSO!</h2><i class="fas fa-check-circle" style="font-size:100px; color:#00ff00"></i><button class="btn" style="width:200px; margin-top:20px" onclick="location.reload()">VOLTAR</button>';
                        }
                    }, 5000);
                }
            } catch(e) { alert('Erro ao gerar pagamento. Tente novamente.'); }
        }
        render();
    </script>
</body>
</html>
