<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Admin PierBlox - Galeria</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0f; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 120px; }
        h1 { text-align: center; color: var(--accent); }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: grid; grid-template-columns: 80px 1.5fr 1fr 50px; gap: 15px; align-items: center; }
        input, button { background: #1a1a24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .img-preview { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; border: 2px solid #444; background: #000; cursor: pointer; }
        .file-input { display: none; }
        .btn-upload { background: #333; font-size: 10px; margin-top: 5px; cursor: pointer; text-align: center; border: 1px dashed #666; padding: 4px; border-radius: 4px; }
        .btn-del { background: #ff4444; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,15,0.95); padding: 20px; border-top: 1px solid #333; text-align: center; backdrop-filter: blur(10px); z-index: 100; }
        .btn-save { background: var(--accent); color: black; padding: 15px 40px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .status { font-size: 13px; color: var(--accent); margin-top: 8px; font-weight: bold; }
        .hidden-url { display: none; }
    </style>
</head>
<body>
    <div class='container'>
        <h1>Painel PierBlox (Galeria) 🖼️</h1>
        <div id='product-list'>Carregando produtos...</div>
        
        <div class='card' style='border: 2px solid var(--accent); background: rgba(0,255,136,0.03);'>
            <div style='text-align:center;'>
                <img id='new-preview' class='img-preview' src='https://via.placeholder.com/150?text=FOTO' onclick="document.getElementById('new-file').click()">
                <input type='file' id='new-file' class='file-input' accept='image/*' onchange="handleUpload(this, 'new')">
                <div class='btn-upload' onclick="document.getElementById('new-file').click()">TIRAR FOTO / GALERIA</div>
            </div>
            <input type='text' id='nn' placeholder='Nome do Item'>
            <input type='number' id='np' placeholder='Preço'>
            <button class='btn-add' onclick='add()'>ADICIONAR</button>
            <input type='hidden' id='ni'>
        </div>
    </div>

    <div class='save-bar'>
        <button class='btn-save' id='btn-save' onclick='save()'>SALVAR E ATUALIZAR SITE ✅</button>
        <div class='status' id='status-msg'>Pronto</div>
    </div>

    <script>
        let products = [];
        const REPO = 'mykallyx/pierblox-store';
        let TOKEN = localStorage.getItem('gh_token');

        async function init() {
            if(!TOKEN) {
                TOKEN = prompt('Digite seu GitHub Token:');
                if(TOKEN) localStorage.setItem('gh_token', TOKEN);
            }
            try {
                const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html?t=' + Date.now());
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const match = content.match(/let products = (\\[[\s\S]*?\\]);/);
                if(match) {
                    products = JSON.parse(match[1]);
                    render();
                }
            } catch(e) {
                document.getElementById('status-msg').innerText = 'Erro ao carregar!';
            }
        }

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map((p, i) => <div class='card'>
                <div style='text-align:center;'>
                    <img src='" + p.img + "' class='img-preview' id='preview-" + i + "' onclick="document.getElementById('file-" + i + "').click()">
                    <input type='file' id='file-" + i + "' class='file-input' accept='image/*' onchange="handleUpload(this, " + i + ")">
                    <div class='btn-upload' onclick="document.getElementById('file-" + i + "').click()">ALTERAR FOTO</div>
                </div>
                <input type='text' value='" + p.name + "' onchange='products[" + i + "].name=this.value'>
                <input type='number' value='" + p.price + "' onchange='products[" + i + "].price=Number(this.value)'>
                <button class='btn-del' onclick='products.splice(" + i + ",1); render()'>X</button>
            </div>").join('');
        }

        async function handleUpload(input, index) {
            if(!input.files || !input.files[0]) return;
            const status = document.getElementById('status-msg');
            status.innerText = '⏳ ENVIANDO IMAGEM...';
            
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                const fileName = 'assets/uploads/img_' + Date.now() + '.jpg';
                
                try {
                    const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + fileName, {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: 'Upload via Admin', content: base64 })
                    });
                    
                    if(res.ok) {
                        const rawUrl = 'https://raw.githubusercontent.com/' + REPO + '/main/' + fileName;
                        if(index === 'new') {
                            document.getElementById('ni').value = rawUrl;
                            document.getElementById('new-preview').src = rawUrl;
                        } else {
                            products[index].img = rawUrl;
                            render();
                        }
                        status.innerText = 'IMAGEM OK! ✅';
                    } else { status.innerText = 'ERRO NO UPLOAD!'; }
                } catch(err) { status.innerText = 'ERRO DE CONEXÃO!'; }
            };
            reader.readAsDataURL(file);
        }

        function add() {
            const n = document.getElementById('nn').value;
            const p = document.getElementById('np').value;
            const i = document.getElementById('ni').value;
            if(!n || !p || !i) return alert('Selecione uma FOTO e preencha nome/preço!');
            products.push({ name: n, price: Number(p), img: i, cat: 'bloxfruit' });
            document.getElementById('nn').value = '';
            document.getElementById('np').value = '';
            document.getElementById('ni').value = '';
            document.getElementById('new-preview').src = 'https://via.placeholder.com/150?text=FOTO';
            render();
        }

        async function save() {
            const btn = document.getElementById('btn-save');
            const status = document.getElementById('status-msg');
            btn.innerText = '⏳ ATUALIZANDO...';
            status.innerText = 'Sincronizando com o site...';
            
            try {
                const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html?t=' + Date.now());
                const d = await r.json();
                let c = decodeURIComponent(escape(atob(d.content)));
                
                // Limpa timestamps antigos para evitar cache e insere o novo array
                const newProductsJs = 'let products = ' + JSON.stringify(products, null, 4) + ';';
                c = c.replace(/let products = \\[[\s\S]*?\\];/, newProductsJs);
                
                const update = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Admin: Catalogo atualizado ' + new Date().getTime(),
                        content: btoa(unescape(encodeURIComponent(c))),
                        sha: d.sha
                    })
                });
                
                if(update.ok) {
                    status.innerText = 'SITE ATUALIZADO! ✅ (Aguarde 30s)';
                    alert('SUCESSO! O site já está atualizando. Se não mudar na hora, limpe o cache do Chrome.');
                } else { alert('Erro ao salvar no servidor.'); }
            } catch(e) { alert('Erro de rede.'); }
            btn.innerText = 'SALVAR E ATUALIZAR SITE ✅';
        }
        init();
    </script>
</body>
</html>
