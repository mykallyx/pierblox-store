<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Admin PierBlox - V3</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0f; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }
        h1 { text-align: center; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: grid; grid-template-columns: 80px 1.5fr 1fr 1fr 50px; gap: 15px; align-items: center; }
        input, button { background: #1a1a24; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }
        .img-preview { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; border: 1px solid #444; background: #000; cursor: pointer; }
        .file-input { display: none; }
        .btn-upload { background: #333; font-size: 11px; margin-top: 5px; cursor: pointer; border-style: dashed; }
        .btn-upload:hover { border-color: var(--accent); color: var(--accent); }
        .btn-del { background: #ff4444; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; height: 45px; }
        .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,15,0.9); padding: 20px; border-top: 1px solid #333; text-align: center; backdrop-filter: blur(15px); }
        .btn-save { background: var(--accent); color: black; padding: 15px 50px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
        .status { font-size: 12px; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <div class='container'>
        <h1>Painel PierBlox V3 🛠️</h1>
        <div id='product-list'>Carregando produtos...</div>
        
        <div class='card' style='background: rgba(0,255,136,0.05); border-color: var(--accent);'>
            <div style='text-align:center;'>
                <img id='new-preview' class='img-preview' src='https://via.placeholder.com/150?text=FOTO' onclick="document.getElementById('new-file').click()">
                <input type='file' id='new-file' class='file-input' accept='image/*' onchange="handleUpload(this, 'new')">
                <div class='btn-upload' onclick="document.getElementById('new-file').click()">GALERIA</div>
            </div>
            <input type='text' id='nn' placeholder='Nome do Blox Fruit'>
            <input type='number' id='np' placeholder='Preço (Ex: 50)'>
            <input type='text' id='ni' placeholder='URL da Imagem' onchange="document.getElementById('new-preview').src=this.value">
            <button class='btn-add' onclick='add()'>ADICIONAR</button>
        </div>
    </div>

    <div class='save-bar'>
        <button class='btn-save' id='btn-save' onclick='save()'>PUBLICAR MUDANÇAS ✅</button>
        <div class='status' id='status-msg'>Pronto para editar</div>
    </div>

    <script>
        let products = [];
        const REPO = 'mykallyx/pierblox-store';
        let TOKEN = localStorage.getItem('gh_token');

        async function init() {
            if(!TOKEN) {
                TOKEN = prompt('Digite seu GitHub Token:');
                if(TOKEN) localStorage.setItem('gh_token', TOKEN);
            }
            try {
                const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html');
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const match = content.match(/let products = (\\[[\s\S]*?\\]);/);
                if(match) {
                    products = JSON.parse(match[1]);
                    render();
                }
            } catch(e) {
                document.getElementById('status-msg').innerText = 'Erro ao carregar loja!';
            }
        }

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map((p, i) => <div class='card'>
                <div style='text-align:center;'>
                    <img src='" + p.img + "' class='img-preview' id='preview-" + i + "' onclick="document.getElementById('file-" + i + "').click()">
                    <input type='file' id='file-" + i + "' class='file-input' accept='image/*' onchange="handleUpload(this, " + i + ")">
                    <div class='btn-upload' onclick="document.getElementById('file-" + i + "').click()">GALERIA</div>
                </div>
                <input type='text' value='" + p.name + "' onchange='products[" + i + "].name=this.value'>
                <input type='number' value='" + p.price + "' onchange='products[" + i + "].price=Number(this.value)'>
                <input type='text' value='" + p.img + "' id='input-img-" + i + "' onchange='products[" + i + "].img=this.value; render()'>
                <button class='btn-del' onclick='products.splice(" + i + ",1); render()'>X</button>
            </div>").join('');
        }

        async function handleUpload(input, index) {
            if(!input.files || !input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            const status = document.getElementById('status-msg');
            
            status.innerText = 'Fazendo upload da imagem...';
            
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                const fileName = 'assets/uploads/img_' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                
                try {
                    const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + fileName, {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: 'Admin: Upload de imagem',
                            content: base64
                        })
                    });
                    
                    if(res.ok) {
                        const rawUrl = 'https://raw.githubusercontent.com/' + REPO + '/main/' + fileName;
                        if(index === 'new') {
                            document.getElementById('ni').value = rawUrl;
                            document.getElementById('new-preview').src = rawUrl;
                        } else {
                            products[index].img = rawUrl;
                            render();
                        }
                        status.innerText = 'Imagem enviada com sucesso! ✅';
                    } else {
                        status.innerText = 'Erro no upload! Verifique o Token.';
                    }
                } catch(err) {
                    status.innerText = 'Erro de conexão no upload.';
                }
            };
            reader.readAsDataURL(file);
        }

        function add() {
            const n = document.getElementById('nn').value;
            const p = document.getElementById('np').value;
            const i = document.getElementById('ni').value;
            if(!n || !p) return alert('Preencha nome e preço!');
            products.push({ name: n, price: Number(p), img: i || 'https://via.placeholder.com/150', cat: 'bloxfruit' });
            document.getElementById('nn').value = '';
            document.getElementById('np').value = '';
            document.getElementById('ni').value = '';
            document.getElementById('new-preview').src = 'https://via.placeholder.com/150?text=FOTO';
            render();
        }

        async function save() {
            const btn = document.getElementById('btn-save');
            const status = document.getElementById('status-msg');
            btn.innerText = '⏳ PUBLICANDO...';
            status.innerText = 'Salvando mudanças no GitHub...';
            
            try {
                const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html');
                const d = await r.json();
                let c = decodeURIComponent(escape(atob(d.content)));
                c = c.replace(/let products = \\[[\s\S]*?\\];/, 'let products = ' + JSON.stringify(products, null, 4) + ';');
                
                const update = await fetch('https://api.github.com/repos/' + REPO + '/contents/index.html', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Admin: Atualização do catálogo',
                        content: btoa(unescape(encodeURIComponent(c))),
                        sha: d.sha
                    })
                });
                
                if(update.ok) {
                    alert('✅ LOJA ATUALIZADA COM SUCESSO! As mudanças aparecerão em 1 minuto.');
                    status.innerText = 'Publicado com sucesso! ✅';
                } else {
                    alert('❌ Erro ao salvar. Verifique se o Token é válido.');
                    status.innerText = 'Erro ao salvar.';
                }
            } catch(e) { 
                alert('Erro na conexão ao salvar.');
                status.innerText = 'Erro de rede.';
            }
            btn.innerText = 'PUBLICAR MUDANÇAS ✅';
        }
        init();
    </script>
</body>
</html>
